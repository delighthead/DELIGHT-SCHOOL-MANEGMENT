<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Profile - Delight International School</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <h2>Teacher Panel</h2>
      <a href="../index.html">Website Home</a>
      <a href="teacher.html">Dashboard Overview</a>
      <a href="teacher-profile.html" class="active">My Profile</a>
      <a href="teacher-class.html">Assigned Class</a>
      <a href="teacher-students.html">Students</a>
      <a href="teacher-scores.html">Scores & Uploads</a>
      <a href="teacher-attendance.html">Mark Attendance</a>
      <a href="teacher-announcements.html">Announcements</a>
      <a href="../pages/login.html">Logout</a>
    </aside>

    <main class="dashboard-main">
      <h1>My Profile</h1>
      <p>View and update your teacher profile details.</p>

      <section class="dashboard-section">
        <h2>Profile Summary</h2>

        <div style="display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;">
          <div id="teacherPhotoBox"></div>

          <div class="dashboard-cards" id="teacherProfileBox" style="flex:1;">
            <div class="dashboard-card">
              <h2>Loading Profile...</h2>
              <p>Please wait.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="dashboard-section">
        <h2>Edit Profile</h2>

        <form class="admin-form" id="teacherProfileForm" enctype="multipart/form-data">
          <div>
            <label>Phone Number</label>
            <input type="text" id="teacher_profile_phone" placeholder="Enter phone number">
          </div>

          <div>
            <label>Email Address</label>
            <input type="email" id="teacher_profile_email" placeholder="Enter email address">
          </div>

          <div>
            <label>Upload Profile Picture</label>
            <input type="file" id="teacher_profile_picture" accept="image/*">
          </div>

          <button type="submit">Update Profile</button>
        </form>
      </section>

</main>

  </div>

  <script src="../js/teacher-profile-api.js?v=3"></script>
  <script src="../js/panel-title.js?v=1"></script>
  <script src="../js/logout.js?v=2"></script>
  <script src="../js/teacher-guard.js?v=1"></script>
  <script src="../js/site-footer-settings.js?v=1"></script>
  <script src="../js/site-settings.js?v=4"></script>
  <script src="../js/admin-common-polish.js?v=1"></script>
  <script src="../js/teacher-dropdown-final.js?v=2"></script>
  <script src="../js/assign-teacher-subject-dropdown.js?v=1"></script>
  <script src="../js/auth-token-fix.js?v=1"></script>
  <script src="../js/teacher-token-check.js?v=1"></script>
  <script src="../js/api-helper.js?v=2"></script>
  <script src="../js/teacher-profile-update-final.js?v=5"></script>
  <script src="../js/teacher-profile-picture-display-final.js?v=3"></script>
  <script src="../js/teacher-profile-summary-final.js?v=1"></script>
  <script src="../js/teacher-profile-summary-rebuild-final.js?v=1"></script>
  <script src="../js/teacher-profile-name-final.js?v=2"></script>
  <script src="../js/teacher-scores-class-fix.js?v=1"></script>
  <script src="../js/remove-sidebar-blank-logo.js?v=1"></script>
</body>
</html>
